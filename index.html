<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonardo M Scarcia — Art Director</title>
    <link href="https://api.fontshare.com/v2/css?f[]=archivo@400,500,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { font-family: 'Archivo', sans-serif; background-color: #0F0F0F; color: #F0F0F0; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        /* CURSOR CON LOGO RECUPERADO */
        .custom-cursor { 
            position: fixed; 
            width: 30px; 
            height: 30px; 
            border-radius: 50%; 
            background-image: url('logo.png'); 
            background-size: contain; 
            background-repeat: no-repeat;
            background-position: center; 
            background-color: #FFFFFF; 
            pointer-events: none; 
            z-index: 9999; 
            transform: translate(-50%, -50%); 
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1), height 0.3s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        section { padding: 8rem 4rem; }
        h2 { font-size: 7vw; font-weight: 500; text-transform: uppercase; margin-bottom: 4rem; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6rem; }
        .project { display: flex; flex-direction: column; }
        .image-wrapper { overflow: hidden; aspect-ratio: 4/5; background: #1A1A1A; border-radius: 2px; }
        .image-wrapper.video-wide { aspect-ratio: 16/9; }
        .image-wrapper img, .image-wrapper video { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .project:hover img, .project:hover video { transform: scale(1.05); }
        .project-info { margin-top: 1.5rem; }

        .hero { height: 100vh; display: flex; align-items: center; padding: 0 4rem; }
        .hero h1 { font-size: 10vw; line-height: 0.9; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>

    <nav style="padding: 2.5rem 4rem; position: fixed; z-index: 100; display: flex; gap: 2.5rem; mix-blend-mode: difference;">
        <a href="#work">Projects</a>
        <a href="#about">About</a>
        <a href="#nft">NFT</a>
        <a href="#community">Community</a>
        <a href="#contact">Contact</a>
    </nav>

    <header class="hero">
        <h1>Art Director <br>& Graphic Designer</h1>
    </header>

    <section id="work" class="grid">
        <a href="#" class="project"><div class="image-wrapper"><img src="image1.jpg" alt="Obra"></div><div class="project-info"><h3>Buda Collective</h3></div></a>
        <a href="#" class="project"><div class="image-wrapper"><img src="image2.jpg" alt="Obra"></div><div class="project-info"><h3>Pleain air Painting</h3></div></a>
        <a href="#" class="project"><div class="image-wrapper"><img src="image3.jpg" alt="Obra"></div><div class="project-info"><h3>Rebranding</h3></div></a>
        <a href="#" class="project video-wide"><div class="image-wrapper video-wide"><video autoplay loop muted playsinline><source src="tu-video-1.mp4" type="video/mp4"></video></div><div class="project-info"><h3>Exhibition</h3></div></a>
    </section>
