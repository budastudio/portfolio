<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonardo M Scarcia — Art Director</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { font-family: 'Inter', sans-serif; background-color: #0F0F0F; color: #F0F0F0; overflow-x: hidden; }

        /* Cursor */
        .custom-cursor { position: fixed; width: 30px; height: 30px; border-radius: 50%; background-image: url('logo.png'); background-size: contain; background-position: center; background-color: #FFFFFF; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s; }

        /* Estructura común */
        section { padding: 8rem 4rem; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4rem; }
        
        /* Proyectos (Imagen/Video) */
        .image-wrapper { overflow: hidden; aspect-ratio: 4/5; background: #1A1A1A; }
        .image-wrapper.video-wide { aspect-ratio: 16/9; }
        .image-wrapper img, .image-wrapper video { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .project:hover img, .project:hover video { transform: scale(1.05); }

        /* About Me */
        .about-container { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
        .about-photo { aspect-ratio: 1/1; background: #222; border-radius: 2px; }

        /* Formulario */
        form { display: flex; flex-direction: column; gap: 1.5rem; max-width: 500px; }
        input, textarea { background: transparent; border: none; border-bottom: 1px solid #444; color: white; padding: 1rem 0; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>

    <nav style="padding: 2.5rem 4rem; position: fixed; z-index: 100; display: flex; gap: 2rem; mix-blend-mode: difference;">
        <a href="#work" class="menu-link">Projects</a>
        <a href="#about" class="menu-link">About</a>
        <a href="#nft" class="menu-link">NFT</a>
        <a href="#community" class="menu-link">Community</a>
        <a href="#contact" class="menu-link">Contact</a>
    </nav>

    <section id="work" class="grid">
        <a href="#" class="project"><div class="image-wrapper"><img src="imagen1.jpg"></div></a>
        <a href="#" class="project video-wide"><div class="image-wrapper video-wide"><video autoplay loop muted><source src="video1.mp4"></video></div></a>
    </section>

    <section id="about" class="about-container">
        <div class="about-photo" style="background-image: url('tu-foto.jpg'); background-size: cover;"></div>
        <div><h2>About Me</h2><p>Director de arte enfocado en el futuro de la web.</p></div>
    </section>

    <section id="nft" class="grid">
        <a href="URL_DEL_NFT" class="project">
            <div class="image-wrapper"><img src="nft1.jpg"></div>
            <div class="project-info"><h2>Nombre Obra</h2><span>Ver en Marketplace</span></div>
        </a>
    </section>

    <section id="community">
        <h2>Community Web3</h2>
        <div class="slider-container" style="height: 300px; background: #1a1a1a; margin-top: 2rem;">
            </div>
    </section>

    <section id="contact">
        <h2>Trabajemos juntos</h2>
        <a href="mailto:budastudiomkt@gmail.com">budastudiomkt@gmail.com</a>
        <form style="margin-top: 3rem;">
            <input type="text" placeholder="Nombre">
            <input type="email" placeholder="Email">
            <textarea placeholder="Tu proyecto"></textarea>
        </form>
    </section>

    <script>
        // Cursor Logic
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        document.querySelectorAll('a, .project').forEach(el => {
            el.addEventListener('mouseenter', () => { cursor.style.width = '80px'; cursor.style.height = '80px'; });
            el.addEventListener('mouseleave', () => { cursor.style.width = '30px'; cursor.style.height = '30px'; });
        });
    </script>
</body>
</html>
