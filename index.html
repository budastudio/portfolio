<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonardo M Scarcia — Art Director</title>
    <link href="https://api.fontshare.com/v2/css?f[]=archivo@400,500,600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { font-family: 'Archivo', sans-serif; background-color: #0F0F0F; color: #F0F0F0; overflow-x: hidden; }

        /* Cursor con Logo */
        .custom-cursor { position: fixed; width: 30px; height: 30px; border-radius: 50%; background-image: url('logo.png'); background-size: contain; background-position: center; background-color: #FFFFFF; pointer-events: none; z-index: 9999; transform: translate(-50%, -50%); transition: width 0.3s, height 0.3s; }

        section { padding: 8rem 4rem; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4rem; }
        
        /* Contenedores */
        .image-wrapper { overflow: hidden; aspect-ratio: 4/5; background: #1A1A1A; border-radius: 2px; }
        .image-wrapper.video-wide { aspect-ratio: 16/9; }
        .image-wrapper img, .image-wrapper video { width: 100%; height: 100%; object-fit: cover; transition: 0.8s; }
        .project:hover img, .project:hover video { transform: scale(1.05); }

        h2 { font-size: 3rem; margin-bottom: 2rem; font-weight: 500; text-transform: uppercase; letter-spacing: -0.05em; }
    </style>
</head>
<body>

    <div class="custom-cursor" id="cursor"></div>

    <nav style="padding: 2.5rem 4rem; position: fixed; z-index: 100; display: flex; gap: 2rem; mix-blend-mode: difference;">
        <a href="#work" class="menu-link">Projects</a>
        <a href="#about" class="menu-link">About</a>
        <a href="#nft" class="menu-link">NFT</a>
        <a href="#community" class="menu-link">Community</a>
        <a href="#contact" class="menu-link">Contact</a>
    </nav>

    <section id="work" class="grid">
        <a href="#" class="project"><div class="image-wrapper"><img src="image1.jpg"></div></a>
        <a href="#" class="project"><div class="image-wrapper"><img src="image2.jpg"></div></a>
        <a href="#" class="project"><div class="image-wrapper"><img src="image3.jpg"></div></a>
        <a href="#" class="project video-wide"><div class="image-wrapper video-wide"><video autoplay loop muted playsinline><source src="tu-video-1.mp4" type="video/mp4"></video></div></a>
    </section>

    <section id="about" style="display: grid; grid-template-columns: 1fr 1fr; gap: 4rem;">
        <div style="aspect-ratio: 4/5; background: #222;"></div> <div><h2>About Me</h2><p style="font-size: 1.2rem; line-height: 1.6;">Director de arte especializado en branding, motion y ecosistemas web3. Mi enfoque combina la estética minimalista con la innovación técnica.</p></div>
    </section>

    <section id="nft" class="grid">
        <a href="#" class="project"><div class="image-wrapper"><img src="nft1.jpg"></div></a>
        <a href="#" class="project"><div class="image-wrapper"><img src="nft2.jpg"></div></a>
    </section>

    <section id="contact">
        <h2>Trabajemos juntos</h2>
        <a href="mailto:budastudiomkt@gmail.com" style="color: #fff; font-size: 2rem;">budastudiomkt@gmail.com</a>
        <form style="display: flex; flex-direction: column; gap: 1rem; margin-top: 3rem;">
            <input type="text" placeholder="Nombre" style="background: transparent; border: 0; border-bottom: 1px solid #333; color: white; padding: 1rem;">
            <textarea placeholder="Tu mensaje" style="background: transparent; border: 0; border-bottom: 1px solid #333; color: white; padding: 1rem;"></textarea>
        </form>
    </section>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; });
        document.querySelectorAll('a, .project').forEach(el => {
            el.addEventListener('mouseenter', () => { cursor.style.width = '80px'; cursor.style.height = '80px'; cursor.style.backgroundColor = 'transparent'; });
            el.addEventListener('mouseleave', () => { cursor.style.width = '30px'; cursor.style.height = '30px'; cursor.style.backgroundColor = '#FFFFFF'; });
        });
    </script>
</body>
</html>
